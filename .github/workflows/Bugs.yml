name: devops-pipeline
on: workflow_dispatch

jobs:
  build-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6
        with:
          ref: main

      - name: get pem file
        run:
          echo "${{secrets.my_secret}}" > Bugs-key.pem
          chmod 400 Bugs-key.pem
      - name: cp app.py
        run: scp -o StrictHostKeyChecking=no -i Bugs-key.pem app.py ec2-user@13.203.232.64:/home/ec2-user/
      - name: cp req.txt
        run: scp -o StrictHostKeyChecking=no -i Bugs-key.pem requirements.txt ec2-user@13.203.232.64:/home/ec2-user/ 
      - name: run app
        run: ssh -o StrictHostKeyChecking=no -i Bugs-key.pem ec2-user@13.203.232.64"cd/home/ec2-user && python3 -m venv venv && source venv/bin/activate && pip3 install -r requirements.txt && python3 app.py
